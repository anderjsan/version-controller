version: '3'

services:
  version-control:
    build:
      context: .
      dockerfile: Dockerfile-version-controller  # Certifique-se de que o Dockerfile está no diretório correto
    image: DinD/version-control:3.7.0
    ports:
      - "4004:4005"
    volumes:
      - ./.version:/app/.version
    container_name: version-control
    restart: unless-stopped
